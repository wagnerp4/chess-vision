# YOLO Configuration
model:
  name: "yolov8n"  # Options: yolov8n, yolov8s, yolov8m, yolov8l, yolov8x
  pretrained: true
  input_size: 640

data:
  dataset_path: "data/processed/chess-pieces-2/dataset.yaml"
  train_split: 0.8
  val_split: 0.15
  test_split: 0.05
  num_workers: 0
  batch_size: 8

training:
  epochs: 100
  patience: 20
  device: "mps"
  plots: false
  amp: false
  save_dir: "data/checkpoints/yolo"
  project: "data/runs/detect"
  name: "yolo_chess_pieces_2"
  
  optimizer:
    lr0: 0.01
    lrf: 0.01
    momentum: 0.937
    weight_decay: 0.0005
    warmup_epochs: 3.0
    warmup_momentum: 0.8
    warmup_bias_lr: 0.1

  augmentation:
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    degrees: 0.0
    translate: 0.1
    scale: 0.5
    shear: 0.0
    perspective: 0.0
    flipud: 0.0
    fliplr: 0.5
    mosaic: 1.0
    mixup: 0.0

evaluation:
  conf_threshold: 0.25
  iou_threshold: 0.45
  max_det: 300

