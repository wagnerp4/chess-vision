# RF-DETR Large fine-tune on Roboflow Chess Pieces 2
model:
  name: "rfdetr"
  size: "large"
  pretrained: true
  input_size: 704

data:
  dataset_path: "data/processed/chess-pieces-2"
  train_split: 0.8
  val_split: 0.15
  test_split: 0.05
  num_workers: 4
  batch_size: 2
  grad_accum_steps: 8

training:
  epochs: 100
  patience: 20
  skip_best_epochs: 3
  fast_dev_max_batches: 64
  log_every_n_steps: 10
  progress_bar: "tqdm"
  device: "cuda"
  save_dir: "data/checkpoints/rfdetr"
  project: "exps"
  name: "rfdetr_large_chess_pieces_2"

  optimizer:
    lr: 0.0001
    lr_encoder: 0.00015
    weight_decay: 0.0001
    warmup_epochs: 5
    lr_scheduler: "cosine"

  augmentation:
    horizontal_flip: 0.5
    color_jitter: 0.4
    random_crop: true
    resize_range: [480, 800]

evaluation:
  conf_threshold: 0.25
  iou_threshold: 0.5
  max_det: 100
  post_train:
    - dataset_path: "data/processed/chess-pieces-2/dataset.yaml"
      split: "val"
    - dataset_path: "data/processed/neuroTUM-chess-dataset/dataset.yaml"
      split: "test"
      label: "neuroTUM_domain_shift"
